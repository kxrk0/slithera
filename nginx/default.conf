server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets — cache aggressively
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # WebSocket proxy → game container (internal port 3000)
    location /ws {
        proxy_pass http://game:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_connect_timeout 4s;
        proxy_send_timeout 86400;
    }

    # Health endpoint proxy — returns 200 with ok:false when game is down
    location /health {
        proxy_pass http://game:3000/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        error_page 502 503 504 = @health_down;
    }
    location @health_down {
        return 200 '{"ok":false}';
        add_header Content-Type application/json;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
